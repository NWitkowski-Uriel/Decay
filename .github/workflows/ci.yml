name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify toolchain
        shell: bash
        run: |
          set -euo pipefail
          command -v cmake
          command -v c++
          command -v root-config
          root-config --version

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build -j

      - name: Run decay multiplicity test
        shell: bash
        run: |
          set -euo pipefail
          ./build/test_decay_multiplicities | tee test_output.txt
          if grep -q "ERROR" test_output.txt; then
            echo "Decay test failed"
            exit 1
          fi
