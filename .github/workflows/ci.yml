name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda install -y root cmake make gcc gxx qt-main

      - name: Build
        shell: bash -l {0}
        run: |
          cmake -S . -B build
          cmake --build build -j

      - name: Run decay test
        shell: bash -l {0}
        run: |
          ./build/test_decay_multiplicities | tee test_output.txt
          if grep -q "ERROR" test_output.txt; then
            echo "Decay test failed"
            exit 1
          fi
